<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <!-- Central Glyph Gradient -->
    <linearGradient id="glyphGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Smooth rounded square container (standard App Icon viewport) -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" />

  <!-- Inner glowing circle layout -->
  <circle cx="256" cy="256" r="180" fill="#0f172a" fill-opacity="0.15" />

  <!-- High-tech grid overlay inside -->
  <path d="M156 256h200M256 156v200" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="8 8" />

  <!-- Main stylized central glyph representing orchestration and smart layers -->
  <g filter="url(#dropShadow)">
    <!-- Base geometric shield or square representing the Sandbox container -->
    <rect x="186" y="186" width="140" height="140" rx="28" fill="url(#glyphGrad)" />
    
    <!-- Outer energy orbit or layered sparkles -->
    <path d="M160 170c0 0 50-10 60-50 10 40 60 50 60 50-12 0-50 10-60 50-10-40-60-50-60-50z" fill="#ffffff" />
    <path d="M312 342c0 0 35-7 42-35 7 28 42 35 42 35-8 0-35 7-42 35-7-28-42-35-42-35z" fill="#f59e0b" />

    <!-- Core star/sparkle cut inside the white tile -->
    <path d="M256 216c0 0 10 16 24 24 14 8 24 16 24 16s-16 10-24 24c-14 8-24 16-24 16s-10-16-24-24c-14-8-24-16-24-16s16-10 24-24c14-8 24-16 24-16z" fill="#4f46e5" />
  </g>
</svg>
